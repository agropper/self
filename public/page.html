<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAIA</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      color: #333;
      background: #fff;
    }
    h1 { color: #1976d2; border-bottom: 2px solid #1976d2; padding-bottom: 0.5rem; }
    h2 { color: #1976d2; margin-top: 2rem; }
    h3 { color: #444; margin-top: 1.5rem; }
    a { color: #1976d2; }
    p { margin: 0.8rem 0; }
    ul, ol { margin: 0.8rem 0 0.8rem 1.5rem; }
    li { margin: 0.3rem 0; }
    strong { font-weight: 600; }
    blockquote {
      background: #e3f2fd;
      border-left: 4px solid #1976d2;
      padding: 0.75rem 1rem;
      margin: 1rem 0;
      border-radius: 0 4px 4px 0;
    }
    blockquote p { margin: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f7fa; }
    code { background: #f5f5f5; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
    /* Accordion styling for <details>/<summary> */
    details {
      border-bottom: 1px solid #e0e0e0;
      padding: 0.75rem 0;
    }
    details:last-of-type { border-bottom: none; }
    details summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 1.05rem;
      padding: 0.25rem 0;
      list-style: none;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before {
      content: '\25B6';
      display: inline-block;
      margin-right: 0.5rem;
      transition: transform 0.15s ease;
      color: #1976d2;
    }
    details[open] summary::before { transform: rotate(90deg); }
    details > :not(summary) { padding-left: 1.5rem; }
    .footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      font-size: 0.85rem;
      color: #888;
    }
    #content { min-height: 200px; }
  </style>
</head>
<body>
  <div id="content">Loading...</div>
  <div class="footer">
    CC-BY MAIA by Adrian Gropper, MD &middot;
    <a href="#" onclick="window.close(); return false;">Close</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const doc = (params.get('doc') || '').replace(/[^a-zA-Z0-9_-]/g, '');
      if (!doc) { document.getElementById('content').textContent = 'No document specified.'; return; }
      try {
        const res = await fetch('/' + doc + '.md', { cache: 'no-cache' });
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        document.getElementById('content').innerHTML = marked.parse(md);
        // Set page title from first H1
        const h1 = document.querySelector('#content h1');
        if (h1) document.title = h1.textContent + ' \u2014 MAIA';
      } catch (e) {
        document.getElementById('content').textContent = 'Could not load document: ' + doc;
      }
    })();
  </script>
</body>
</html>
